name: lint-sync
on:
  # schedule:
  #   # every Sunday at midnight
  #   - cron: "0 0 * * 0"
  workflow_dispatch: # allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    # Fork: upstream-only — syncs Charm's golangci config and opens PRs.
    # Manual-only anyway; skipped on forks.
    if: github.repository == 'charmbracelet/crush'
    uses: charmbracelet/meta/.github/workflows/lint-sync.yml@main
